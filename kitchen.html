<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>หน้าจอห้องครัว (KDS)</title>
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #1a1a2e; margin: 0; color: #ecf0f1; padding: 20px; }
        
        .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 2px solid #2c3e50; padding-bottom: 15px;}
        h1 { margin: 0; color: #f1c40f; display: flex; align-items: center; gap: 10px;}
        
        .controls { display: flex; gap: 15px; }
        .btn-batch { background: #3498db; color: white; border: none; padding: 12px 20px; border-radius: 8px; font-size: 1.1em; font-weight: bold; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.2); transition: 0.2s;}
        .btn-batch:active { transform: scale(0.95); }
        
        .btn-sound { background: #e74c3c; color: white; border: none; padding: 12px 20px; border-radius: 8px; font-size: 1.1em; font-weight: bold; cursor: pointer; transition: 0.3s; animation: pulse-red 1.5s infinite;}
        .btn-sound.active { background: #2ecc71; animation: none; }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(231,76,60,0.7); } 70% { box-shadow: 0 0 0 10px rgba(231,76,60,0); } 100% { box-shadow: 0 0 0 0 rgba(231,76,60,0); } }

        .orders-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        
        .order-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.3); color: #333; display: flex; flex-direction: column; transition: 0.3s;}
        
        .status-normal .card-header { background: #2ecc71; color: white; }
        .status-normal { border: 3px solid #2ecc71; }

        .status-warning .card-header { background: #f1c40f; color: #2c3e50; }
        .status-warning { border: 3px solid #f1c40f; background: #fffdf5;}

        .status-alert .card-header { background: #e74c3c; color: white; }
        .status-alert { border: 3px solid #e74c3c; background: #fdedec; animation: alert-blink 2s infinite;}
        
        @keyframes alert-blink { 0% { box-shadow: 0 0 10px rgba(231,76,60,0.2); } 50% { box-shadow: 0 0 25px rgba(231,76,60,0.8); } 100% { box-shadow: 0 0 10px rgba(231,76,60,0.2); } }

        .card-header { padding: 15px; display: flex; justify-content: space-between; align-items: center; font-size: 1.3em; font-weight: bold;}
        .time-badge { background: rgba(0,0,0,0.2); padding: 5px 10px; border-radius: 8px; font-size: 0.9em; display: flex; align-items: center; gap: 5px;}
        
        .card-body { padding: 15px; flex-grow: 1;}
        .menu-name { font-size: 1.4em; font-weight: bold; margin-bottom: 5px; color: #2c3e50;}
        .menu-qty { font-size: 1.2em; color: #e74c3c; font-weight: bold; background: #ffeaa7; display: inline-block; padding: 5px 15px; border-radius: 8px; margin-bottom: 10px;}
        .menu-note { background: #f1f2f6; padding: 10px; border-radius: 8px; font-size: 1em; color: #d35400; border-left: 4px solid #f39c12; margin-bottom: 15px;}

        .btn-serve { background: #27ae60; color: white; border: none; padding: 15px; width: 100%; font-size: 1.3em; font-weight: bold; cursor: pointer; transition: 0.2s;}
        .btn-serve:active { background: #219150; }
        .btn-serve:disabled { background: #95a5a6; cursor: not-allowed; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; backdrop-filter: blur(5px);}
        .modal-box { background: white; padding: 25px; border-radius: 15px; width: 100%; max-width: 400px; max-height: 80vh; overflow-y: auto; position: relative; color: #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5);}
        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 1.5em; cursor: pointer; color: #aaa; background: none; border: none;}
        
        .batch-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px dashed #ddd; font-size: 1.2em;}
        .batch-name { color: #34495e; font-weight: bold; }
        .batch-qty { background: #e74c3c; color: white; padding: 5px 15px; border-radius: 8px; font-weight: bold; }

        .empty-state { text-align: center; font-size: 1.5em; color: #7f8c8d; padding: 50px; grid-column: 1 / -1; background: rgba(255,255,255,0.05); border-radius: 12px; border: 2px dashed #34495e;}
    </style>
</head>
<body>

    <div class="header-bar">
        <h1>🔥 Kitchen Display (KDS)</h1>
        <div class="controls">
            <button class="btn-batch" onclick="showBatchSummary()">📊 ดูยอดรวมค้างทำ</button>
            <button id="sound-toggle-btn" class="btn-sound" onclick="toggleSound()">🔇 เปิดเสียง (ต้องกดก่อน!)</button>
        </div>
    </div>

    <div id="kitchen-container" class="orders-grid">
        <p style="text-align:center; font-size:1.2em;">กำลังโหลดออเดอร์...</p>
    </div>

    <div id="batch-modal" class="modal-overlay">
        <div class="modal-box">
            <button class="close-btn" onclick="document.getElementById('batch-modal').style.display='none'">✖</button>
            <h2 style="margin-top: 0; color: #2c3e50; border-bottom: 2px solid #f1f2f6; padding-bottom: 10px;">
                📊 ยอดรวมอาหารค้างทำ
            </h2>
            <div id="batch-summary-list" style="margin-top: 15px;"></div>
            <button onclick="document.getElementById('batch-modal').style.display='none'" style="width: 100%; padding: 15px; background: #e74c3c; color: white; border: none; border-radius: 8px; font-size: 1.2em; font-weight: bold; margin-top: 20px; cursor: pointer;">
                ปิดหน้าต่าง
            </button>
        </div>
    </div>

    <script>
        const BACKEND_URL = 'https://my-pos-backend-0s18.onrender.com';
        
        let isSoundEnabled = false;
        let slaWarningMinutes = 10; 
        let slaAlertMinutes = 20;   
        let alertSoundUrl = 'https://actions.google.com/sounds/v1/alarms/beep_short.ogg'; 

        async function fetchSettings() {
            try {
                const response = await fetch(`${BACKEND_URL}/api/settings?t=${new Date().getTime()}`);
                const data = await response.json();
                
                if (data.sla_warning_time) slaWarningMinutes = data.sla_warning_time;
                if (data.sla_alert_time) slaAlertMinutes = data.sla_alert_time;

                if (data.alert_sound === 'bell') {
                    alertSoundUrl = 'https://actions.google.com/sounds/v1/alarms/dinner_bell_triangle.ogg';
                } else if (data.alert_sound === 'kitchen') {
                    alertSoundUrl = 'https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg';
                } else if (data.alert_sound === 'default') {
                    alertSoundUrl = 'https://actions.google.com/sounds/v1/alarms/beep_short.ogg';
                } else if (data.alert_sound) {
                    alertSoundUrl = data.alert_sound;
                }
            } catch (error) {
                console.error("ดึงตั้งค่า SLA ไม่สำเร็จ ใช้ค่าเริ่มต้น");
            }
        }

        function toggleSound() {
            isSoundEnabled = !isSoundEnabled;
            const btn = document.getElementById('sound-toggle-btn');
            if (isSoundEnabled) {
                btn.classList.add('active');
                btn.innerHTML = '🔊 ระบบเสียงทำงานแล้ว';
                playAlertSound(); 
            } else {
                btn.classList.remove('active');
                btn.innerHTML = '🔇 เปิดเสียง (ต้องกดก่อน!)';
            }
        }

        function playAlertSound() {
            if (isSoundEnabled) {
                const audio = new Audio(alertSoundUrl);
                audio.volume = 1.0; 
                audio.play().catch(e => console.log("เบราว์เซอร์บล็อกเสียง กรุณากดปุ่มเปิดเสียงก่อน"));
            }
        }

        async function fetchKitchenOrders() {
            try {
                const response = await fetch(`${BACKEND_URL}/api/cashier/orders?t=${new Date().getTime()}`);
                const orders = await response.json();
                renderKitchenUI(orders);
            } catch (error) {
                console.error('Error fetching kitchen orders', error);
            }
        }

        function renderKitchenUI(orders) {
            const container = document.getElementById('kitchen-container');
            let html = '';
            let hasOrders = false;
            let pendingItems = [];

            orders.forEach(order => {
                if (order.order_items) {
                    order.order_items.forEach(item => {
                        if (item.status !== 'served') {
                            
                            let timeVal = item.ordered_at || item.created_at || order.created_at;
                            
                            // 🌟 แก้ปัญหาเวลาเริ่มที่ 420 นาที (Timezone Offset ของประเทศไทย)
                            // บังคับเติม Z เข้าไปต่อท้าย เพื่อให้เบราว์เซอร์รู้ว่านี่คือเวลาสากล (UTC)
                            if (timeVal && !timeVal.includes('Z') && !timeVal.includes('+')) {
                                timeVal += 'Z'; 
                            }
                            
                            let cTime = timeVal ? new Date(timeVal).getTime() : new Date().getTime();
                            if (isNaN(cTime)) cTime = new Date().getTime();

                            pendingItems.push({
                                orderId: order.id,
                                tableNo: order.tables?.table_number || '?',
                                itemId: item.id,
                                name: item.menu_items?.name.split('(')[0].trim() || 'ไม่ทราบชื่อ',
                                quantity: item.quantity,
                                notes: item.notes,
                                createdAt: cTime
                            });
                        }
                    });
                }
            });

            pendingItems.sort((a, b) => a.createdAt - b.createdAt);

            pendingItems.forEach(item => {
                hasOrders = true;
                
                html += `
                    <div id="order-card-${item.itemId}" class="order-card status-normal" data-created-at="${item.createdAt}">
                        <div class="card-header">
                            <span>🍽️ โต๊ะ ${item.tableNo}</span>
                            <div id="timer-${item.itemId}" class="time-badge">⏱️ 00:00</div>
                        </div>
                        <div class="card-body">
                            <div class="menu-name">${item.name}</div>
                            <div class="menu-qty">จำนวน: x${item.quantity}</div>
                            ${item.notes ? `<div class="menu-note">📝 ${item.notes}</div>` : ''}
                        </div>
                        <button class="btn-serve" onclick="markAsServed(${item.itemId}, this)">
                            ✔️ ทำเสร็จแล้ว
                        </button>
                    </div>
                `;
            });

            if (!hasOrders) {
                html = '<div class="empty-state">🎉 ไม่มีออเดอร์ค้าง ทำความสะอาดครัวได้เลยครับเชฟ!</div>';
            }

            container.innerHTML = html;
            tickTimers(); 
        }

        async function markAsServed(itemId, btnElement) {
            if(!itemId) return;
            
            const originalText = btnElement.innerHTML;
            btnElement.innerHTML = '⏳ กำลังบันทึก...';
            btnElement.disabled = true;

            try {
                const response = await fetch(`${BACKEND_URL}/api/orders/serve`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ item_id: itemId })
                });
                
                const result = await response.json();

                if (response.ok && result.success) {
                    const card = document.getElementById(`order-card-${itemId}`);
                    if(card) {
                        card.style.transform = "scale(0)"; 
                        setTimeout(() => {
                            card.remove(); 
                            if(document.querySelectorAll('.order-card').length === 0) {
                                document.getElementById('kitchen-container').innerHTML = '<div class="empty-state">🎉 ไม่มีออเดอร์ค้าง ทำความสะอาดครัวได้เลยครับเชฟ!</div>';
                            }
                        }, 200); 
                    }
                } else {
                    alert('❌ ไม่สามารถบันทึกได้ โปรดเช็คว่าอัปเดตไฟล์ index.js ครบถ้วนแล้ว');
                    btnElement.innerHTML = originalText;
                    btnElement.disabled = false;
                }
            } catch (error) {
                console.error("Error:", error);
                alert('❌ ขาดการเชื่อมต่อกับเซิร์ฟเวอร์');
                btnElement.innerHTML = originalText;
                btnElement.disabled = false;
            }
        }

        function tickTimers() {
            const cards = document.querySelectorAll('.order-card');
            const now = new Date().getTime();
            
            cards.forEach(card => {
                const createdAt = parseInt(card.getAttribute('data-created-at'));
                const itemId = card.id.replace('order-card-', '');
                
                let diffMs = now - createdAt;
                if (diffMs < 0) diffMs = 0;

                const diffMins = Math.floor(diffMs / 60000);
                const diffSecs = Math.floor((diffMs % 60000) / 1000);
                const timeString = `${String(diffMins).padStart(2, '0')}:${String(diffSecs).padStart(2, '0')}`;
                
                const timerEl = document.getElementById(`timer-${itemId}`);
                
                if (diffMins >= slaAlertMinutes) {
                    card.className = 'order-card status-alert';
                    if(timerEl) timerEl.innerHTML = '🔥 ' + timeString;
                } else if (diffMins >= slaWarningMinutes) {
                    card.className = 'order-card status-warning';
                    if(timerEl) timerEl.innerHTML = '⚠️ ' + timeString;
                } else {
                    card.className = 'order-card status-normal';
                    if(timerEl) timerEl.innerHTML = '⏱️ ' + timeString;
                }
            });
        }
        
        setInterval(tickTimers, 1000);

        async function showBatchSummary() {
            const listContainer = document.getElementById('batch-summary-list');
            listContainer.innerHTML = '<p style="text-align:center; color:#7f8c8d; font-size:1.1em;">⏳ กำลังคำนวณยอดรวม...</p>';
            document.getElementById('batch-modal').style.display = 'flex';

            try {
                const response = await fetch(`${BACKEND_URL}/api/cashier/orders?t=${new Date().getTime()}`);
                const orders = await response.json();

                let summary = {};
                let totalItems = 0;

                orders.forEach(order => {
                    if (order.order_items) {
                        order.order_items.forEach(item => {
                            if (item.status !== 'served') {
                                const name = item.menu_items?.name.split('(')[0].trim() || 'ไม่ทราบชื่อ';
                                if (!summary[name]) summary[name] = 0;
                                summary[name] += item.quantity;
                                totalItems += item.quantity;
                            }
                        });
                    }
                });

                let summaryArray = Object.keys(summary).map(key => ({ name: key, qty: summary[key] }));
                summaryArray.sort((a, b) => b.qty - a.qty);

                let html = '';
                if (summaryArray.length === 0) {
                    html = '<p style="text-align:center; font-size:1.3em; color:#27ae60; font-weight:bold; margin: 30px 0;">🎉 เคลียร์ออเดอร์หมดแล้วครับเชฟ!</p>';
                } else {
                    summaryArray.forEach(item => {
                        html += `
                            <div class="batch-item">
                                <span class="batch-name">${item.name}</span>
                                <span class="batch-qty">x${item.qty}</span>
                            </div>
                        `;
                    });
                    html += `
                        <div style="text-align: right; margin-top: 15px; font-size: 1.3em; font-weight: bold; color: #2c3e50;">
                            รวมค้างทำทั้งหมด: <span style="color:#e74c3c;">${totalItems}</span> จาน
                        </div>
                    `;
                }
                listContainer.innerHTML = html;
            } catch (error) {
                listContainer.innerHTML = '<p style="color:red; text-align:center;">❌ ไม่สามารถดึงข้อมูลได้</p>';
            }
        }

        const socket = io(BACKEND_URL);

        // 🌟 แก้ไข: เปลี่ยนคำสั่งเป็น update_kitchen ให้ตรงกับหลังบ้าน!
        socket.on('update_kitchen', () => {
            playAlertSound(); 
            fetchKitchenOrders(); 
        });

        socket.on('update_settings', () => {
            fetchSettings(); 
        });

        fetchSettings().then(() => fetchKitchenOrders());

    </script>
</body>
</html>
